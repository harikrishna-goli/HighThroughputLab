name: Load Test

on:
  workflow_dispatch:
    inputs:
      users:
        description: "Number of Locust users"
        required: true
        default: "100"
      spawn_rate:
        description: "Users spawned per second"
        required: true
        default: "25"
      run_time:
        description: "Test duration, for example 1m, 5m, 30s"
        required: true
        default: "1m"
      api_replicas:
        description: "Number of API containers behind Nginx"
        required: true
        default: "2"

jobs:
  locust:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DB_USER: sharduser
      DB_PASSWORD: shardpass123
      DB_NAME: financial_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create results directory
        run: mkdir -p results

      - name: Build Docker images
        run: docker compose --profile loadtest build

      - name: Start API stack
        run: docker compose up -d --scale api="${{ inputs.api_replicas }}" nginx

      - name: Wait for stack stabilization
        run: |
          # Require a healthy nginx endpoint and consecutive successful API reads
          # so Locust does not start during worker warmup/recycle windows.
          success_streak=0
          for i in {1..60}; do
            if ! curl -fsS http://localhost:8000/nginx-health > /dev/null; then
              echo "Nginx is not healthy yet... attempt $i"
              success_streak=0
              sleep 5
              continue
            fi

            if curl -fsS -X POST http://localhost:8000/read/balance \
              -H "Content-Type: application/json" \
              -d '{"user_unique_id":"USER-0001","PINCode":"000001"}' > /dev/null; then
              success_streak=$((success_streak + 1))
              echo "Read API healthy streak: ${success_streak}/10"
              if [ "$success_streak" -ge 10 ]; then
                echo "Stack is stable and ready for load test"
                exit 0
              fi
            else
              success_streak=0
              echo "API readiness probe failed, resetting streak"
            fi

            sleep 2
          done

          echo "Stack did not stabilize in time"
          docker compose logs api nginx db-init
          exit 1

      - name: Run Locust headless
        run: |
          docker compose --profile loadtest run --rm locust \
            locust -f locustfile.py \
              --host http://nginx \
              --headless \
              --users "${{ inputs.users }}" \
              --spawn-rate "${{ inputs.spawn_rate }}" \
              --run-time "${{ inputs.run_time }}" \
              --csv /loadtest/results/loadtest \
              --html /loadtest/results/loadtest-report.html \
              --exit-code-on-error 1

      - name: Save service logs
        if: always()
        run: docker compose logs --no-color > results/docker-compose.log

      - name: Upload Locust results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results
          path: results/
          if-no-files-found: warn

      - name: Stop Docker stack
        if: always()
        run: docker compose --profile loadtest down
