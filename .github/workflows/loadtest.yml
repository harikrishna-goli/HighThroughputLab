name: Load Test

on:
  workflow_dispatch:
    inputs:
      users:
        description: "Number of Locust users"
        required: true
        default: "100"
      spawn_rate:
        description: "Users spawned per second"
        required: true
        default: "25"
      run_time:
        description: "Test duration, for example 1m, 5m, 30s"
        required: true
        default: "1m"

jobs:
  locust:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DB_USER: sharduser
      DB_PASSWORD: shardpass123
      DB_NAME: financial_db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create results directory
        run: mkdir -p results

      - name: Build Docker images
        run: docker compose --profile loadtest build

      - name: Start API stack
        run: docker compose up -d api

      - name: Wait for API readiness
        run: |
          for i in {1..60}; do
            if curl -fsS -X POST http://localhost:8000/read/balance \
              -H "Content-Type: application/json" \
              -d '{"user_unique_id":"USER-0001","PINCode":"000001"}' > /dev/null; then
              echo "API is ready"
              exit 0
            fi

            echo "Waiting for API startup and database initialization... attempt $i"
            sleep 5
          done

          echo "API did not become ready in time"
          docker compose logs api
          exit 1

      - name: Run Locust headless
        run: |
          docker compose --profile loadtest run --rm locust \
            locust -f locustfile.py \
              --host http://api:8000 \
              --headless \
              --users "${{ inputs.users }}" \
              --spawn-rate "${{ inputs.spawn_rate }}" \
              --run-time "${{ inputs.run_time }}" \
              --csv /loadtest/results/loadtest \
              --html /loadtest/results/loadtest-report.html \
              --exit-code-on-error 1

      - name: Upload Locust results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results
          path: results/
          if-no-files-found: warn

      - name: Show service logs
        if: always()
        run: docker compose logs

      - name: Stop Docker stack
        if: always()
        run: docker compose --profile loadtest down
