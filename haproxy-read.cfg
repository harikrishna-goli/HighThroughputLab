# TCP load balancing for read-only PostgreSQL connections.
# Writes go directly to postgres-primary; reads are spread across replicas.

global
    log stdout format raw local0
    # HAProxy reserves ~2 fds per global maxconn; Docker often caps nofile at 65536.
    maxconn 16384

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  600s
    timeout server  600s
    balance roundrobin

listen read_replicas
    bind *:15432
    default-server inter 3s fall 3 rise 2
    server rep1 postgres-replica-1:5432 check
    server rep2 postgres-replica-2:5432 check
    server rep3 postgres-replica-3:5432 check
    server rep4 postgres-replica-4:5432 check
