# TCP load balancing: each listener spreads read connections across the shard
# primary and two streaming replicas (round robin).

global
    log stdout format raw local0
    # HAProxy reserves ~2 fds per global maxconn; Docker often caps nofile at 65536.
    # 50000 maxconn asks for ~100k fds and exits: "Cannot raise FD limit ... limit is 65536".
    maxconn 16384

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  600s
    timeout server  600s
    balance roundrobin

listen read_shard_1
    bind *:15432
    default-server inter 3s fall 3 rise 2
    server primary postgres-shard-1:5432 check
    server rep1    postgres-shard-1-replica-1:5432 check
    server rep2    postgres-shard-1-replica-2:5432 check

listen read_shard_2
    bind *:15433
    default-server inter 3s fall 3 rise 2
    server primary postgres-shard-2:5432 check
    server rep1    postgres-shard-2-replica-1:5432 check
    server rep2    postgres-shard-2-replica-2:5432 check

listen read_shard_3
    bind *:15434
    default-server inter 3s fall 3 rise 2
    server primary postgres-shard-3:5432 check
    server rep1    postgres-shard-3-replica-1:5432 check
    server rep2    postgres-shard-3-replica-2:5432 check

listen read_shard_4
    bind *:15435
    default-server inter 3s fall 3 rise 2
    server primary postgres-shard-4:5432 check
    server rep1    postgres-shard-4-replica-1:5432 check
    server rep2    postgres-shard-4-replica-2:5432 check
