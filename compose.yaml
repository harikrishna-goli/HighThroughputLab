services:
  # PostgreSQL 18 Alpine - Shard 1 (Port 5432)
  postgres-shard-1:
    image: postgres:18-alpine
    container_name: postgres-shard-1
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_1:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL 18 Alpine - Shard 2 (Port 5433)
  postgres-shard-2:
    image: postgres:18-alpine
    container_name: postgres-shard-2
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_2:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5


  # PostgreSQL 18 Alpine - Shard 3 (Port 5434)
  postgres-shard-3:
    image: postgres:18-alpine
    container_name: postgres-shard-3
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_3:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL 18 Alpine - Shard 4 (Port 5435)
  postgres-shard-4:
    image: postgres:18-alpine
    container_name: postgres-shard-4
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/
    ports:
      - "5435:5432"
    volumes:
      - postgres_data_4:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: ./FinancialApp-1MRps
      dockerfile: Dockerfile
    container_name: financial-api
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_POOL_SIZE: 25
      DB_MAX_OVERFLOW: 25
      DB_POOL_TIMEOUT: 30
      SHARD_1: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres-shard-1:5432/${DB_NAME}"
      SHARD_2: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres-shard-2:5432/${DB_NAME}"
      SHARD_3: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres-shard-3:5432/${DB_NAME}"
      SHARD_4: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres-shard-4:5432/${DB_NAME}"
    depends_on:
      postgres-shard-1:
        condition: service_healthy
      postgres-shard-2:
        condition: service_healthy
      postgres-shard-3:
        condition: service_healthy
      postgres-shard-4:
        condition: service_healthy
    ports:
      - "8000:8000"

  # Locust Load Testing Container
  locust:
    build:
      context: .
      dockerfile: Dockerfile.loadtest
    container_name: financial-loadtest
    environment:
      LOCUST_HOST: http://api:8000
    depends_on:
      api:
        condition: service_started
    ports:
      - "8089:8089"
    volumes:
      - ./results:/loadtest/results
    profiles:
      - loadtest

volumes:
  postgres_data_1:
  postgres_data_2:
  postgres_data_3:
  postgres_data_4:
