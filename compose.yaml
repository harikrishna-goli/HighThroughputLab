  redis:
    image: redis:7-alpine
    container_name: financial-redis
    command:
      [
        "redis-server",
        "--maxmemory",
        "1gb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--appendonly",
        "no",
      ]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    build:
      context: ./FinancialApp-1MRps
      dockerfile: Dockerfile
    container_name: financial-db-init
    command: ["python", "init_db.py"]
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_POOL_SIZE: 5
      DB_MAX_OVERFLOW: 5
      DB_POOL_TIMEOUT: 30
      WRITE_SHARD_HOSTS: "postgres-shard-1,postgres-shard-2,postgres-shard-3,postgres-shard-4"
    depends_on:
      postgres-shard-1:
        condition: service_healthy
      postgres-shard-2:
        condition: service_healthy
      postgres-shard-3:
        condition: service_healthy
      postgres-shard-4:
        condition: service_healthy

  haproxy-read:
    image: haproxy:3.0-alpine
    container_name: financial-haproxy-read
    volumes:
      - ./haproxy-read.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    expose:
      - "15432"
      - "15433"
      - "15434"
      - "15435"
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres-shard-1-replica-1:
        condition: service_healthy
      postgres-shard-1-replica-2:
        condition: service_healthy
      postgres-shard-2-replica-1:
        condition: service_healthy
      postgres-shard-2-replica-2:
        condition: service_healthy
      postgres-shard-3-replica-1:
        condition: service_healthy
      postgres-shard-3-replica-2:
        condition: service_healthy
      postgres-shard-4-replica-1:
        condition: service_healthy
      postgres-shard-4-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./FinancialApp-1MRps
      dockerfile: Dockerfile
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_POOL_SIZE: 10
      DB_MAX_OVERFLOW: 20
      DB_POOL_TIMEOUT: 30
      UVICORN_TIMEOUT_KEEP_ALIVE: 10
      REDIS_URL: redis://redis:6379/0
      ACCOUNT_CACHE_TTL_SECONDS: 120
      READ_BALANCER_HOST: haproxy-read
      READ_BALANCER_PORTS: "15432,15433,15434,15435"
      WRITE_SHARD_HOSTS: "postgres-shard-1,postgres-shard-2,postgres-shard-3,postgres-shard-4"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      haproxy-read:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'').read()"',
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: financial-nginx
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  locust:
    build:
      context: .
      dockerfile: Dockerfile.loadtest
    container_name: financial-loadtest
    environment:
      LOCUST_HOST: http://nginx
    depends_on:
      nginx:
        condition: service_healthy
    ports:
      - "8089:8089"
    volumes:
      - ./results:/loadtest/results
    profiles:
      - loadtest

volumes:
  postgres_data_1:
  postgres_data_2:
  postgres_data_3:
  postgres_data_4:
  postgres_replica_1_1:
  postgres_replica_1_2:
  postgres_replica_2_1:
  postgres_replica_2_2:
  postgres_replica_3_1:
  postgres_replica_3_2:
  postgres_replica_4_1:
  postgres_replica_4_2:
