services:
  # PostgreSQL 18 Alpine — Shard 1 primary (host port 5432)
  postgres-shard-1:
    image: postgres:18-alpine
    container_name: postgres-shard-1
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicapass456}
      PGDATA: /var/lib/postgresql/
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=16
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*
      - -c
      - wal_keep_size=1GB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_1:/var/lib/postgresql/
      - ./docker/postgres/init-replication:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

