services:
  # PostgreSQL 18 Alpine - Shard 1 (Port 5432)
  postgres-shard-1:
    image: postgres:18-alpine
    container_name: postgres-shard-1
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_1:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL 18 Alpine - Shard 2 (Port 5433)
  postgres-shard-2:
    image: postgres:18-alpine
    container_name: postgres-shard-2
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_2:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL 18 Alpine - Shard 3 (Port 5434)
  postgres-shard-3:
    image: postgres:18-alpine
    container_name: postgres-shard-3
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_3:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL 18 Alpine - Shard 4 (Port 5435)
  postgres-shard-4:
    image: postgres:18-alpine
    container_name: postgres-shard-4
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/
    ports:
      - "5435:5432"
    volumes:
      - postgres_data_4:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: financial-redis
    command:
      [
        "redis-server",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--appendonly",
        "no",
      ]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    build:
      context: ./FinancialApp-1MRps
      dockerfile: Dockerfile
    container_name: financial-db-init
    command: ["python", "init_db.py"]
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_POOL_SIZE: 5
      DB_MAX_OVERFLOW: 5
      DB_POOL_TIMEOUT: 30
    depends_on:
      postgres-shard-1:
        condition: service_healthy
      postgres-shard-2:
        condition: service_healthy
      postgres-shard-3:
        condition: service_healthy
      postgres-shard-4:
        condition: service_healthy

  # FastAPI Application
  api:
    build:
      context: ./FinancialApp-1MRps
      dockerfile: Dockerfile
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_POOL_SIZE: 20
      DB_MAX_OVERFLOW: 20
      DB_POOL_TIMEOUT: 30
      WEB_CONCURRENCY: 6
      WORKER_CONNECTIONS: 1000
      MAX_REQUESTS: 200000
      MAX_REQUESTS_JITTER: 5000
      GUNICORN_TIMEOUT: 60
      GUNICORN_KEEP_ALIVE: 10
      REDIS_URL: redis://redis:6379/0
      ACCOUNT_CACHE_TTL_SECONDS: 120
      SHARD_1: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres-shard-1:5432/${DB_NAME}"
      SHARD_2: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres-shard-2:5432/${DB_NAME}"
      SHARD_3: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres-shard-3:5432/${DB_NAME}"
      SHARD_4: "postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres-shard-4:5432/${DB_NAME}"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'').read()"',
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: financial-nginx
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  # Locust Load Testing Container
  locust:
    build:
      context: .
      dockerfile: Dockerfile.loadtest
    container_name: financial-loadtest
    environment:
      LOCUST_HOST: http://nginx
    depends_on:
      nginx:
        condition: service_healthy
    ports:
      - "8089:8089"
    volumes:
      - ./results:/loadtest/results
    profiles:
      - loadtest

volumes:
  postgres_data_1:
  postgres_data_2:
  postgres_data_3:
  postgres_data_4:
